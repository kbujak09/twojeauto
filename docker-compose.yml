services:
  # DATABASE (MongoDB)
  db:
    image: mongo:latest
    container_name: twojeauto_db
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: twojeauto_db
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  # BACKEND (Node.js)
  server:
    build: ./server
    container_name: twojeauto_server
    restart: always
    ports:
      - '3000:3000'
    volumes:
      - ./server:/src:z
      - /src/node_modules
    depends_on:
      - db
    environment:
      DATABASE_URL: mongodb://admin:password123@db:27017/twojeauto_db?authSource=admin

  # FRONTEND (React + Vite)
  client:
    build: ./app
    container_name: twojeauto_client
    restart: always
    ports:
      - '5173:5173'
    volumes:
      - ./app:/src:z
      - /src/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  mongo_data: